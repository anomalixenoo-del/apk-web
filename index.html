<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lobby Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <div class="profile">
    <img src="https://i.pravatar.cc/100">
    <div>User123</div>
  </div>
  <div class="balance">Rp <span id="saldo">1000</span></div>
</div>

<div class="marquee">
  <span>🎯 Jackpot besar dimenangkan pemain! 🔥</span>
</div>

<div class="games">

  <div class="game" onclick="play('Olympus')">
    <img src="https://i.imgur.com/8Qf6G9P.jpg">
    <div class="title">Olympus</div>
  </div>

  <div class="game" onclick="play('Mahjong')">
    <img src="https://i.imgur.com/qIufhof.jpg">
    <div class="title">Mahjong</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
